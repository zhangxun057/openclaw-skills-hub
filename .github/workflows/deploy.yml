name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  repository_dispatch:
    types: [skilllist-update]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Checkout skilllist from source repo
        uses: actions/checkout@v4
        with:
          repository: zhangxun057/openclaw-skills
          path: skilllist-source
          sparse-checkout: |
            skilllist.json

      - name: Prepare dist
        run: |
          mkdir -p dist
          # 复制HTML
          cp public/index.html dist/index.html
          # 复制静态JSON（方案C）
          cp skilllist-source/skilllist.json dist/skilllist.json
          # 把JSON转成JS变量
          echo "var SKILL_DATA = $(cat skilllist-source/skilllist.json);" > dist/skills.js
          # 在HTML末尾嵌入技能数据（供AI读取，不显示）
          cat >> dist/index.html << 'SKILLEMBED'
          <!-- AI-readable skill list (hidden) -->
          <script type="application/ld+json" id="skill-list-data">
          SKILLEMBED
          cat skilllist-source/skilllist.json >> dist/index.html
          cat >> dist/index.html << 'SKILLEMBED'
          </script>
          SKILLEMBED

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: claw-skills
          directory: ./dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
