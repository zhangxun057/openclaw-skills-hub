name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  repository_dispatch:
    types: [skilllist-update]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Checkout skilllist from source repo
        uses: actions/checkout@v4
        with:
          repository: zhangxun057/openclaw-skills
          path: skilllist-source
          sparse-checkout: |
            skilllist.json

      - name: Prepare dist
        run: |
          mkdir -p dist
          cp public/index.html dist/index.html
          # 把JSON转成JS变量
          echo "var SKILL_DATA = $(cat skilllist-source/skilllist.json);" > dist/skills.js

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: claw-skills
          directory: ./dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
