<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Skills - 张洵的技能库</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: #0a0a0f;
            color: #fff;
            line-height: 1.6;
        }
        
        .bg-pattern {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 40px 40px;
            pointer-events: none;
        }
        
        .container {
            position: relative;
            max-width: 1400px;
            margin: 0 auto;
            padding: 60px 24px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 48px;
        }
        
        .logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .logo-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 8px 24px rgba(255,107,53,0.3);
        }
        
        .logo-text {
            font-size: 32px;
            font-weight: 800;
            color: #fff;
        }
        
        .subtitle {
            font-size: 18px;
            color: #888;
            margin-bottom: 24px;
        }
        
        .github-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .github-link:hover {
            box-shadow: 0 8px 24px rgba(255,107,53,0.5);
            transform: translateY(-2px);
        }
        
        .search-box {
            max-width: 600px;
            margin: 0 auto 48px;
        }
        
        .search-box input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
        }
        
        .search-box input:focus {
            background: rgba(255,255,255,0.08);
            border-color: #ff6b35;
        }
        
        .search-box input::placeholder { color: #555; }
        
        .category {
            margin-bottom: 48px;
        }
        
        .category-title {
            font-size: 12px;
            font-weight: 700;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 16px;
            padding-left: 4px;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }
        
        .card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .card:hover {
            background: rgba(255,255,255,0.06);
            border-color: #ff6b35;
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(255,107,53,0.2);
        }
        
        .card-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .card-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
            transition: transform 0.3s;
        }
        
        .card:hover .card-icon {
            transform: scale(1.1);
        }
        
        .card-icon.official { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .card-icon.original { background: linear-gradient(135deg, #ff6b35, #f7931e); }
        .card-icon.community { background: linear-gradient(135deg, #64748b, #475569); }
        
        .card-info {
            flex: 1;
            min-width: 0;
        }
        
        .card-title {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .card-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            border: 1px solid;
        }
        
        .badge-official {
            background: rgba(59,130,246,0.1);
            color: #60a5fa;
            border-color: rgba(59,130,246,0.2);
        }
        
        .badge-original {
            background: rgba(255,107,53,0.1);
            color: #ff6b35;
            border-color: rgba(255,107,53,0.2);
        }
        
        .badge-community {
            background: rgba(100,116,139,0.1);
            color: #94a3b8;
            border-color: rgba(100,116,139,0.2);
        }
        
        .card-desc {
            font-size: 13px;
            color: #888;
            line-height: 1.5;
            margin-bottom: 16px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 40px;
        }
        
        .card-actions {
            display: flex;
            gap: 8px;
        }
        
        .btn {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            text-decoration: none;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            color: #fff;
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, #ff5722, #e67e22);
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.05);
            color: #ccc;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .btn-secondary:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    
    <div class="container">
        <div class="header">
            <div class="logo">
                <div class="logo-icon">🦞</div>
                <div class="logo-text">OpenClaw Skills</div>
            </div>
            <div class="subtitle">21 个强大技能，让 AI 助手无所不能</div>
            <a href="https://github.com/zhangxun057/openclaw-skills" target="_blank" class="github-link">
                <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                </svg>
                查看源码
            </a>
        </div>

        <div class="search-box">
            <input type="text" placeholder="搜索技能..." id="search">
        </div>

        <div id="content"></div>
    </div>

    <script>
        const skills = {
            'AI & 图像': [
                { name: 'Agent Tools', slug: 'agent-tools', desc: 'Run 150+ AI apps via inference.sh CLI', icon: '🤖', source: 'community' },
                { name: 'AI Image Generation', slug: 'ai-image-generation', desc: 'AI图像生成工具集成', icon: '🎨', source: 'community' },
                { name: 'Flux Image', slug: 'flux-image', desc: 'Flux 图像生成', icon: '✨', source: 'community' },
                { name: 'AI Product Photography', slug: 'ai-product-photography', desc: 'AI产品摄影', icon: '📸', source: 'community' },
            ],
            '视频 & 数字人': [
                { name: 'AI Marketing Videos', slug: 'ai-marketing-videos', desc: 'AI营销视频生成', icon: '🎬', source: 'community' },
                { name: 'AI Video Generation', slug: 'ai-video-generation', desc: 'AI视频生成工具', icon: '🎥', source: 'community' },
                { name: 'Remotion Render', slug: 'remotion-render', desc: 'Remotion 视频渲染', icon: '🎞️', source: 'community' },
                { name: 'Jimeng Digital Human', slug: 'jimeng-digital-human', desc: '即梦数字人', icon: '👤', source: 'community' },
            ],
            '微信 & 社交': [
                { name: 'WeChat Analyzer', slug: 'wechat-analyzer', desc: '微信好友自动化分析与档案生成工具', icon: '📊', source: 'original' },
                { name: 'WeFlow', slug: 'weflow', desc: 'WeFlow 微信聊天记录工具集成', icon: '💬', source: 'original' },
                { name: 'WeChat Send Message', slug: 'wechat-send-message', desc: '微信消息发送', icon: '📤', source: 'original' },
                { name: 'Baoyu Post to WeChat', slug: 'baoyu-post-to-wechat', desc: '宝玉发布到微信', icon: '📝', source: 'community' },
            ],
            '开发 & 部署': [
                { name: 'Browser Automation', slug: 'browser-automation', desc: 'OpenClaw 浏览器自动化操作', icon: '🌐', source: 'original' },
                { name: 'Cloudflare Deploy', slug: 'cloudflare-deploy', desc: 'Cloudflare Pages 自动部署配置', icon: '☁️', source: 'original' },
                { name: 'Skill Creator', slug: 'skill-creator', desc: 'Create or update AgentSkills', icon: '🛠️', source: 'official' },
                { name: 'Gateway Restart', slug: 'gateway-restart', desc: 'OpenClaw Gateway 服务重启', icon: '🔄', source: 'original' },
            ],
            '系统 & 工具': [
                { name: 'Capability Evolver', slug: 'capability-evolver', desc: 'A self-evolution engine for AI agents', icon: '🧬', source: 'original' },
                { name: 'Task Monitor', slug: 'task-monitor', desc: 'Real-time web dashboard for OpenClaw', icon: '📈', source: 'original' },
                { name: 'Conversation Save', slug: 'conversation-save', desc: '对话存档技能', icon: '💾', source: 'original' },
                { name: 'Feishu', slug: 'feishu', desc: '飞书集成工具', icon: '📋', source: 'community' },
                { name: 'Swap', slug: 'swap', desc: '技能交换功能', icon: '🔀', source: 'original' },
            ],
        };

        const sourceLabels = { official: '官方', original: '原创', community: '社区' };
        const content = document.getElementById('content');

        Object.entries(skills).forEach(([category, items]) => {
            const section = document.createElement('div');
            section.className = 'category';
            section.innerHTML = `
                <div class="category-title">${category}</div>
                <div class="grid">
                    ${items.map(skill => `
                        <div class="card" data-skill>
                            <div class="card-header">
                                <div class="card-icon ${skill.source}">${skill.icon}</div>
                                <div class="card-info">
                                    <div class="card-title">${skill.name}</div>
                                    <span class="card-badge badge-${skill.source}">${sourceLabels[skill.source]}</span>
                                </div>
                            </div>
                            <div class="card-desc">${skill.desc}</div>
                            <div class="card-actions">
                                <a href="https://github.com/zhangxun057/openclaw-skills/tree/master/skills/${skill.slug}" target="_blank" class="btn btn-primary">查看</a>
                                <a href="https://raw.githubusercontent.com/zhangxun057/openclaw-skills/master/skills/${skill.slug}/SKILL.md" target="_blank" class="btn btn-secondary">下载</a>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            content.appendChild(section);
        });

        document.getElementById('search').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            document.querySelectorAll('[data-skill]').forEach(card => {
                const text = card.textContent.toLowerCase();
                card.style.display = text.includes(query) ? 'block' : 'none';
            });
        });
    </script>
</body>
</html>
