<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Skills - 技能共享中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #020617; color: #fff; line-height: 1.6; min-height: 100vh; }
        .bg-pattern { position: fixed; inset: 0; background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.03) 1px, transparent 0); background-size: 40px 40px; pointer-events: none; z-index: 0; }
        .bg-glow { position: fixed; top: 0; left: 50%; transform: translateX(-50%); width: 1000px; height: 500px; background: radial-gradient(circle, rgba(249,115,22,0.06) 0%, transparent 70%); pointer-events: none; z-index: 0; }
        .container { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 60px 24px 80px; }
        .hero { text-align: center; margin-bottom: 48px; }
        .hero-icon { width: 72px; height: 72px; background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); border-radius: 24px; display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 20px; }
        .hero h1 { font-size: 36px; font-weight: 900; margin-bottom: 16px; }
        .hero-desc { font-size: 18px; color: #94a3b8; max-width: 600px; margin: 0 auto; }
        .hero-desc strong { color: #f97316; }
        .search-box { max-width: 500px; margin: 0 auto 32px; }
        .search-input { width: 100%; padding: 16px 24px; background: rgba(15,23,42,0.8); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; color: #fff; font-size: 16px; outline: none; transition: all 0.3s; }
        .search-input:focus { border-color: #f97316; box-shadow: 0 0 0 3px rgba(249,115,22,0.1); }
        .search-input::placeholder { color: #64748b; }
        .tabs { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 40px; }
        .tab { padding: 10px 20px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #94a3b8; font-size: 14px; font-weight: 500; transition: all 0.2s; cursor: pointer; text-decoration: none; }
        .tab:hover { background: rgba(249,115,22,0.1); color: #fff; }
        .tab.active { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); color: #fff; }
        .tab-count { opacity: 0.7; font-size: 12px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 60px; }
        .card { background: rgba(15,23,42,0.6); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 20px; transition: all 0.3s; }
        .card:hover { background: rgba(15,23,42,0.9); border-color: rgba(249,115,22,0.3); transform: translateY(-4px); }
        .card-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
        .card-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
        .icon-official { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); }
        .icon-原创 { background: linear-gradient(135deg, #f97316 0%, #c2410c 100%); }
        .icon-社区 { background: linear-gradient(135deg, #475569 0%, #334155 100%); }
        .card-info { flex: 1; min-width: 0; }
        .card-title { font-size: 16px; font-weight: 700; color: #f1f5f9; margin-bottom: 4px; }
        .card-badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; }
        .badge-official { background: rgba(59,130,246,0.15); color: #60a5fa; }
        .badge-原创 { background: rgba(249,115,22,0.15); color: #fb923c; }
        .badge-社区 { background: rgba(71,85,105,0.15); color: #94a3b8; }
        .card-desc { font-size: 13px; color: #94a3b8; line-height: 1.6; margin-bottom: 14px; }
        .card-actions { display: flex; gap: 8px; }
        .btn { flex: 1; padding: 10px 14px; border-radius: 10px; font-size: 13px; font-weight: 600; text-align: center; text-decoration: none; transition: all 0.2s; border: none; cursor: pointer; display: inline-block; }
        .btn-primary { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); color: #fff; }
        .btn-secondary { background: rgba(255,255,255,0.05); color: #94a3b8; border: 1px solid rgba(255,255,255,0.1); }
        .submit-section { max-width: 600px; margin: 0 auto; padding: 40px; background: rgba(15,23,42,0.8); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .submit-section h2 { font-size: 24px; margin-bottom: 12px; text-align: center; }
        .submit-section p { color: #94a3b8; text-align: center; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; color: #94a3b8; margin-bottom: 6px; font-size: 14px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px 16px; background: #0f172a; border: 1px solid #334155; border-radius: 10px; color: #fff; font-size: 14px; outline: none; }
        .form-group input:focus, .form-group textarea:focus { border-color: #f97316; }
        .form-group input::placeholder { color: #64748b; }
        .form-group textarea { resize: vertical; min-height: 100px; }
        .submit-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); border: none; border-radius: 12px; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; }
        .submit-result { margin-top: 16px; text-align: center; padding: 12px; border-radius: 10px; }
        .submit-result.success { background: rgba(34,197,94,0.1); color: #22c55e; }
        .submit-result.error { background: rgba(239,68,68,0.1); color: #ef4444; }
        .loading { text-align: center; padding: 60px; color: #64748b; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="bg-glow"></div>
    <div class="container">
        <div class="hero">
            <div class="hero-icon">🦞</div>
            <h1>OpenClaw Skills</h1>
            <p class="hero-desc">这里收集了 <strong>各种实用的 AI 技能</strong>。你可以直接使用这些技能，也可以<strong>提交你的想法</strong>，让更多龙虾受益。</p>
        </div>
        <div class="search-box">
            <input type="text" class="search-input" placeholder="搜索技能..." id="search">
        </div>
        <div class="tabs" id="tabs">
            <a href="#" class="tab active" data-category="all">全部 <span class="tab-count" id="count-all">(0)</span></a>
            <a href="#" class="tab" data-category="飞书生态">飞书 <span class="tab-count" id="count-飞书生态">(0)</span></a>
            <a href="#" class="tab" data-category="微信生态">微信 <span class="tab-count" id="count-微信生态">(0)</span></a>
            <a href="#" class="tab" data-category="项目开发">开发 <span class="tab-count" id="count-项目开发">(0)</span></a>
            <a href="#" class="tab" data-category="系统工具">系统 <span class="tab-count" id="count-系统工具">(0)</span></a>
            <a href="#" class="tab" data-category="技能管理">技能 <span class="tab-count" id="count-技能管理">(0)</span></a>
            <a href="#" class="tab" data-category="效率工具">效率 <span class="tab-count" id="count-效率工具">(0)</span></a>
            <a href="#" class="tab" data-category="内容生成">内容 <span class="tab-count" id="count-内容生成">(0)</span></a>
            <a href="#" class="tab" data-category="AI & 图像">AI <span class="tab-count" id="count-AI & 图像">(0)</span></a>
            <a href="#" class="tab" data-category="视频 & 数字人">视频 <span class="tab-count" id="count-视频 & 数字人">(0)</span></a>
            <a href="#" class="tab" data-category="龙虾进化">进化 <span class="tab-count" id="count-龙虾进化">(0)</span></a>
            <a href="#" class="tab" data-category="业务运营">运营 <span class="tab-count" id="count-业务运营">(0)</span></a>
        </div>
        <div id="skills-grid" class="grid"><div class="loading">加载中...</div></div>
        <div class="submit-section">
            <h2>🚀 提交你的技能</h2>
            <p>如果你有好的想法或技能，可以在这里提交</p>
            <form id="submit-form">
                <div class="form-group">
                    <label>技能名称 *</label>
                    <input type="text" name="skillName" required placeholder="给你的技能起个名字">
                </div>
                <div class="form-group">
                    <label>技能描述 *</label>
                    <textarea name="description" required placeholder="这个技能能做什么？"></textarea>
                </div>
                <div class="form-group">
                    <label>来源</label>
                    <select name="source">
                        <option value="社区">社区</option>
                        <option value="原创">原创</option>
                        <option value="官方">官方</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>你的称呼 *</label>
                    <input type="text" name="author" required placeholder="让大家知道你是谁">
                </div>
                <div class="form-group">
                    <label>技能文件夹/文件（可选）</label>
                    <input type="file" name="skillFile">
                </div>
                <div class="form-group">
                    <label>密码 *</label>
                    <input type="password" name="password" required placeholder="联系张洵获取密码">
                </div>
                <button type="submit" class="submit-btn">提交技能</button>
                <div id="submit-result"></div>
            </form>
        </div>
    </div>
    <script src="/skills.js"></script>
    <script>
        const GITHUB_REPO = 'zhangxun057/openclaw-skills';
        let allSkills = [];
        
        function getSourceClass(source) { return { '官方': 'official', '原创': '原创', '社区': '社区' }[source] || '社区'; }
        
        function formatName(slug) { return slug.split(/[-_]/).map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' '); }
        
        function loadSkills() {
            const grid = document.getElementById('skills-grid');
            if (typeof SKILL_DATA !== 'undefined' && SKILL_DATA) {
                allSkills = Object.keys(SKILL_DATA).map(name => {
                    const meta = SKILL_DATA[name];
                    return { name, desc: meta.description || '', icon: meta.icon || '🔧', source: meta.source || '社区', category: meta.category || '其他' };
                });
                renderSkills(allSkills);
                return;
            }
            grid.innerHTML = '<div class="loading">加载中...</div>';
        }
        
        function renderSkills(skills) {
            const grid = document.getElementById('skills-grid');
            const sourceLabels = { '官方': '官方', '原创': '原创', '社区': '社区' };
            if (skills.length === 0) { grid.innerHTML = '<div class="loading">没有找到匹配的技能</div>'; return; }
            grid.innerHTML = skills.map(s => `
                <div class="card" data-cat="${s.category}">
                    <div class="card-header">
                        <div class="card-icon icon-${getSourceClass(s.source)}">${s.icon}</div>
                        <div class="card-info">
                            <div class="card-title">${formatName(s.name)}</div>
                            <span class="card-badge badge-${getSourceClass(s.source)}">${sourceLabels[s.source] || s.source}</span>
                        </div>
                    </div>
                    <div class="card-desc">${s.desc}</div>
                    <div class="card-actions">
                        <a href="https://github.com/${GITHUB_REPO}/tree/master/skills/${s.name}" target="_blank" class="btn btn-primary">查看</a>
                    </div>
                </div>
            `).join('');
            document.getElementById('count-all').textContent = `(${allSkills.length})`;
            const catCounts = {}; allSkills.forEach(s => { catCounts[s.category] = (catCounts[s.category] || 0) + 1; });
            Object.entries(catCounts).forEach(([cat, count]) => { const el = document.getElementById(`count-${cat}`); if (el) el.textContent = `(${count})`; });
        }
        
        document.getElementById('search').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            renderSkills(allSkills.filter(s => s.name.toLowerCase().includes(q) || s.desc.toLowerCase().includes(q)));
        });
        
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', (e) => {
                e.preventDefault();
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const cat = tab.dataset.category;
                renderSkills(cat === 'all' ? allSkills : allSkills.filter(s => s.category === cat));
            });
        });
        
        document.getElementById('submit-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const result = document.getElementById('submit-result');
            const fd = new FormData(form);
            result.innerHTML = '提交中...'; result.className = 'submit-result';
            try {
                const res = await fetch('https://claw-skills.zhangxun057.workers.dev/api/submit', { method: 'POST', body: fd });
                const json = await res.json();
                if (json.success) { result.innerHTML = `✅ 提交成功！ <a href="${json.issueUrl}" target="_blank" style="color:#60a5fa;">查看</a>`; result.className = 'submit-result success'; form.reset(); }
                else { result.innerHTML = '❌ ' + (json.error || '提交失败'); result.className = 'submit-result error'; }
            } catch(err) { result.innerHTML = '❌ 网络错误'; result.className = 'submit-result error'; }
        });
        
        loadSkills();
    </script>
</body>
</html>
