<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Skills - 张洵的技能库</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #020617;
            color: #fff;
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .bg-pattern {
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.03) 1px, transparent 0);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }
        
        .bg-glow {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 1000px;
            height: 500px;
            background: radial-gradient(circle, rgba(249,115,22,0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        
        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 80px 24px 80px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 48px;
        }
        
        .logo-area {
            display: inline-flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            box-shadow: 0 10px 40px rgba(249,115,22,0.4);
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
        
        .logo-text {
            font-size: 42px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff 0%, #f97316 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            font-size: 18px;
            color: #94a3b8;
            margin-bottom: 28px;
            font-weight: 400;
        }
        
        .nav-links {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }
        
        .nav-link {
            padding: 10px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        
        .nav-link:hover {
            background: rgba(249,115,22,0.1);
            border-color: rgba(249,115,22,0.3);
            color: #fff;
        }
        
        .nav-link.active {
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
            border-color: transparent;
            color: #fff;
        }
        
        .github-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(249,115,22,0.3);
        }
        
        .github-link:hover {
            box-shadow: 0 8px 25px rgba(249,115,22,0.5);
            transform: translateY(-2px);
        }
        
        .github-icon { width: 18px; height: 18px; }
        
        .search-box { max-width: 600px; margin: 0 auto 40px; }
        
        .search-input {
            width: 100%;
            padding: 16px 24px;
            background: rgba(15,23,42,0.8);
            backdrop-filter: blur(10px);

        .search-input:focus {

        }
        
        .search-input::placeholder { color: #64748b; }
        
        .category { margin-bottom: 48px; }
        
        .category-title {

            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 20px;

        }
        
        .category-title::after {
            content: '';

            background: linear-gradient(90deg, rgba(255,255,255,0.1), transparent);
        }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }

        .btn {

        .refresh-btn {

        .cache-note { font-size: 12px; color: #64748b; margin-top: 8px; }
    </style>
</head>

    <script>
        const GITHUB_REPO = 'zhangxun057/openclaw-skills';
        const SKILLS_API = `https://api.github.com/repos/${GITHUB_REPO}/contents/skilllist.json`;
        const SKILLS_DIR_API = `https://api.github.com/repos/${GITHUB_REPO}/contents/skills`;
        
        const CACHE_KEY = 'openclaw_skills_cache_v2';
        const CACHE_DURATION = 60 * 60 * 1000;
        
        let skillMetadata = {};
        let allSkills = [];
        
        function getCache() {
            try {
                const cached = localStorage.getItem(CACHE_KEY);
                if (cached) {
                    const data = JSON.parse(cached);
                    if (Date.now() - data.timestamp < CACHE_DURATION) {
                        return data;
                    }
                }
            } catch (e) {}
            return null;
        }
        
        function setCache(data) {
            try {
                localStorage.setItem(CACHE_KEY, JSON.stringify({
                    metadata: data.metadata,
                    skills: data.skills,
                    timestamp: Date.now()
                }));
            } catch (e) {}
        }
        
        function getSourceClass(source) {
            const map = {
                '官方': 'official',
                '原创': '原创',
                '社区': '社区',
                'skills.sh': 'skills.sh',
                'clawhub': 'clawhub',
                '虾评Skill': '虾评Skill',
                '飞书官方': 'official'
            };
            return map[source] || '社区';
        }
        
        function getRatingStars(rating) {
            return '★'.repeat(rating || 0) + '☆'.repeat(5 - (rating || 0));
        }
        
        function formatName(slug) {
            return slug.split(/[-_]/).map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
        }
        
        async function fetchSkillDescription(slug) {
            try {
                const response = await fetch(
                    `https://api.github.com/repos/${GITHUB_REPO}/contents/skills/${slug}/SKILL.md`,
                    { cache: 'no-store' }
                );
                if (!response.ok) return '';
                const data = await response.json();
                if (data.content) {
                    const binary = atob(data.content);
                    const bytes = new Uint8Array(binary.length);
                    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                    const content = new TextDecoder('utf-8').decode(bytes);
                    const match = content.match(/description:\s*["']([^"']+)["']/);
                    if (match) return match[1];
                    const lines = content.split('\n');
                    for (const line of lines) {
                        const trimmed = line.trim();
                        if (trimmed && !trimmed.startsWith('#') && !trimmed.startsWith('---')) {
                            return trimmed.replace(/^[-*>]+\s*/, '').substring(0, 120);
                        }
                    }
                }
            } catch (e) {}
            return '';
        }
        
        async function loadSkills(forceRefresh = false) {
            const content = document.getElementById('content');
            const cacheNote = document.getElementById('cache-note');
            
            if (!forceRefresh) {
                const cache = getCache();
                if (cache) {
                    cacheNote.textContent = '📦 使用缓存 (1小时内有效)';
                    skillMetadata = cache.metadata;
                    allSkills = cache.skills;
                    renderSkills(allSkills);
                    return;
                }
            }
            
            content.innerHTML = '<div class="loading">正在从 GitHub 加载技能列表...</div>';
            
            try {
                // 获取元数据
                const metaResponse = await fetch(SKILLS_API, { cache: 'no-store' });
                if (metaResponse.ok) {
                    const metaData = await metaResponse.json();
                    const binary = atob(metaData.content);
                    const bytes = new Uint8Array(binary.length);
                    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                    const text = new TextDecoder('utf-8').decode(bytes);
                    skillMetadata = JSON.parse(text);
                }
                
                // 获取技能目录
                const dirResponse = await fetch(SKILLS_DIR_API, { cache: 'no-store' });
                if (!dirResponse.ok) throw new Error('获取技能列表失败');
                
                const items = await dirResponse.json();
                const skillDirs = items.filter(item => item.type === 'dir');
                
                // 并行获取描述
                const batchSize = 8;
                const skillsWithDesc = [];
                
                for (let i = 0; i < skillDirs.length; i += batchSize) {
                    const batch = skillDirs.slice(i, i + batchSize);
                    const results = await Promise.all(
                        batch.map(async (dir) => {
                            const name = dir.name;
                            const meta = skillMetadata[name] || {};
                            const desc = await fetchSkillDescription(name);
                            return {
                                name: name,
                                slug: name,
                                desc: desc || meta.description || `查看 ${name} 技能详情`,
                                icon: meta.icon || '🔧',
                                source: meta.source || '社区',
                                category: meta.category || '其他',
                                rating: meta.rating || 3,
                                version: meta.version || '1.0.0',
                                author: meta.author || '社区'
                            };
                        })
                    );
                    skillsWithDesc.push(...results);
                }
                
                allSkills = skillsWithDesc;
                setCache({ metadata: skillMetadata, skills: allSkills });
                cacheNote.textContent = '✅ 已更新到最新';
                
                renderSkills(allSkills);
                
            } catch (error) {
                console.error('加载失败:', error);
                
                const cache = getCache();
                if (cache) {
                    cacheNote.textContent = '⚠️ API 失败，使用缓存数据';
                    skillMetadata = cache.metadata;
                    allSkills = cache.skills;
                    renderSkills(allSkills);
                    return;
                }
                
                content.innerHTML = `<div class="error">加载失败: ${error.message}<br><br>请检查网络或稍后重试</div>`;
            }
        }
        
        function renderSkills(skills) {
            const content = document.getElementById('content');
            const sourceLabels = {
                '官方': '官方',
                '原创': '原创',
                '社区': '社区',
                'skills.sh': 'skills.sh',
                'clawhub': 'clawhub',
                '虾评Skill': '虾评',
                '飞书官方': '飞书官方'
            };
            
            const categoryOrder = [
                '飞书生态', '微信生态', '项目开发', '系统工具', '技能管理',
                '效率工具', '目标管理', '内容生成', 'AI & 图像', '视频 & 数字人', '龙虾进化', '业务运营', '其他'
            ];
            
            // 按分类组织
            const categorized = {};
            for (const skill of skills) {
                const cat = skill.category || '其他';
                if (!categorized[cat]) categorized[cat] = [];
                categorized[cat].push(skill);
            }
            
            document.getElementById('skill-count').textContent = skills.length;
            
            let html = '';
            
            for (const category of categoryOrder) {
                const items = categorized[category];
                if (!items || items.length === 0) continue;
                
                html += `<div class="category" data-category="${category}">
                    <div class="category-title">${category}</div>
                    <div class="grid">`;
                
                for (const skill of items) {
                    const sourceClass = getSourceClass(skill.source);
                    html += `<div class="card" data-skill="${skill.name}" data-cat="${skill.category}">
                        <div class="card-header">
                            <div class="card-icon icon-${sourceClass}">${skill.icon}</div>
                            <div class="card-info">
                                <div class="card-title-row">
                                    <div class="card-title">${formatName(skill.name)}</div>
                                    <span class="card-version">v${skill.version}</span>
                                </div>
                                <div class="card-meta">
                                    <span class="card-badge badge-${sourceClass}">${sourceLabels[skill.source] || skill.source}</span>
                                    <span class="card-rating">${getRatingStars(skill.rating)}</span>
                                    <span class="card-author">${skill.author || ''}</span>
                                </div>
                            </div>
                        </div>
                        <div class="card-desc">${skill.desc}</div>
                        <div class="card-actions">
                            <a href="https://github.com/${GITHUB_REPO}/tree/master/skills/${skill.name}" target="_blank" class="btn btn-primary">查看</a>
                            <a href="https://github.com/${GITHUB_REPO}/archive/refs/heads/master.zip" download class="btn btn-secondary">下载</a>
                        </div>
                    </div>`;
                }
                
                html += '</div></div>';
            }
            
            content.innerHTML = html || '<div class="error">没有找到技能</div>';
        }
        
        // 搜索功能
        document.getElementById('search').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            document.querySelectorAll('.card').forEach(card => {
                const text = card.textContent.toLowerCase();
                card.style.display = text.includes(query) ? 'block' : 'none';
            });
            
            // 隐藏空的分类
            document.querySelectorAll('.category').forEach(cat => {
                const visibleCards = cat.querySelectorAll('.card[style="display: block"], .card:not([style*="display"])');
                cat.style.display = visibleCards.length > 0 ? 'block' : 'none';
            });
        });
        
        // 分类筛选
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const category = link.dataset.category;
                
                // 更新激活状态
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                link.classList.add('active');
                
                // 筛选
                document.querySelectorAll('.card').forEach(card => {
                    if (category === 'all' || card.dataset.cat === category) {
                        card.style.display = 'block';
                    } else {
                        card.style.display = 'none';
                    }
                });
                
                // 显示/隐藏分类
                document.querySelectorAll('.category').forEach(cat => {
                    if (category === 'all') {
                        cat.style.display = 'block';
                    } else {
                        const visibleCards = cat.querySelectorAll(`.card[data-cat="${category}"]`);
                        cat.style.display = visibleCards.length > 0 ? 'block' : 'none';
                    }
                });
            });
        });
        
        loadSkills();
    </script>
</body>
</html>
