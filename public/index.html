        const sourceLabels = { official: '瀹樻柟', original: '鍘熷垱', community: '绀惧尯' };
        const content = document.getElementById('content');

        Object.entries(skills).forEach(([category, items]) => {
            const section = document.createElement('div');
            section.className = 'category';
            
            const title = document.createElement('div');
            title.className = 'category-title';
            title.textContent = category;
            section.appendChild(title);
            
            const grid = document.createElement('div');
            grid.className = 'grid';
            
            items.forEach(skill => {
                const card = document.createElement('div');
                card.className = 'card';
                card.setAttribute('data-skill', '');
                
                card.innerHTML = `
                    <div class="card-header">
                        <div class="card-icon icon-${skill.source}">${skill.icon}</div>
                        <div class="card-info">
                            <div class="card-title">${skill.name}</div>
                            <span class="card-badge badge-${skill.source}">${sourceLabels[skill.source]}</span>
                            ${skill.author ? `<span style="font-size: 11px; color: #888; margin-left: 8px;">by ${skill.author}</span>` : ''}
                        </div>
                    </div>
                    <div class="card-desc">${skill.desc}</div>
                    <div class="card-actions">
                        <a href="https://github.com/zhangxun057/openclaw-skills/tree/master/skills/${skill.slug}" target="_blank" class="btn btn-primary">鏌ョ湅</a>
                        <a href="https://raw.githubusercontent.com/zhangxun057/openclaw-skills/master/skills/${skill.slug}/SKILL.md" target="_blank" class="btn btn-secondary">涓嬭浇</a>
                    </div>
                `;
                
                grid.appendChild(card);
            });
            
            section.appendChild(grid);
            content.appendChild(section);
        });

        document.getElementById('search').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            document.querySelectorAll('[data-skill]').forEach(card => {
                const text = card.textContent.toLowerCase();
                card.style.display = text.includes(query) ? 'block' : 'none';
            });
        });

        // Load pending skills from GitHub Issues
        async function loadPendingSkills() {
            try {
                const response = await fetch('https://api.github.com/repos/zhangxun057/openclaw-skills/issues?labels=skill-submission,pending-review&state=open');
                const issues = await response.json();
                
                if (issues.length > 0) {
                    document.getElementById('pendingSection').style.display = 'block';
                    const pendingList = document.getElementById('pendingList');
                    
                    issues.forEach(issue => {
                        const item = document.createElement('div');
                        item.className = 'pending-item';
                        const match = issue.title.match(/\[Skill Submission\] (.+)/);
                        const skillName = match ? match[1] : issue.title;
                        const date = new Date(issue.created_at).toLocaleDateString('zh-CN');
                        
                        item.innerHTML = `
                            <div class="pending-item-info">
                                <div class="pending-item-name">${skillName}</div>
                                <div class="pending-item-meta">鎻愪氦浜?${date}</div>
                            </div>
                            <a href="${issue.html_url}" target="_blank" class="btn btn-secondary" style="flex: 0 0 auto; padding: 8px 16px; font-size: 13px;">鏌ョ湅璇︽儏</a>
                        `;
                        
                        pendingList.appendChild(item);
                    });
                }
            } catch (error) {
                console.error('Failed to load pending skills:', error);
            }
        }

        loadPendingSkills();

        // Submit form
        document.getElementById('submitForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const result = document.getElementById('submitResult');
            btn.disabled = true;
            btn.textContent = '鎻愪氦涓?..';
            result.innerHTML = '';
            
            try {
                const response = await fetch('/api/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        skillName: document.getElementById('skillName').value,
                        contributor: document.getElementById('contributor').value,
                        content: document.getElementById('skillContent').value,
                        password: document.getElementById('password').value
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    result.innerHTML = `<div class="alert alert-success">鉁?鎻愪氦鎴愬姛锛両ssue #${data.issueNumber} 宸插垱寤恒€?a href="${data.issueUrl}" target="_blank" style="color: #4ade80; text-decoration: underline;">鏌ョ湅</a></div>`;
                    document.getElementById('submitForm').reset();
                } else {
                    result.innerHTML = `<div class="alert alert-error">鉂?${data.error || data.message || '鎻愪氦澶辫触'}</div>`;
                }
            } catch (error) {
                result.innerHTML = `<div class="alert alert-error">鉂?缃戠粶閿欒锛岃閲嶈瘯</div>`;
            } finally {
                btn.disabled = false;
                btn.textContent = '鎻愪氦鎶€鑳?;
            }
        });
    </script>
