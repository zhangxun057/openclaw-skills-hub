<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Skills - 张洵的技能库</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #0a0a0f;
            color: #fff;
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .bg-pattern {
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }
        
        .bg-glow {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 400px;
            background: radial-gradient(circle, rgba(255,107,53,0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        
        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 60px 24px 80px;
        }
        
        .header { text-align: center; margin-bottom: 56px; }
        
        .logo { display: inline-flex; align-items: center; gap: 14px; margin-bottom: 20px; }
        
        .logo-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            box-shadow: 0 10px 30px rgba(255,107,53,0.4);
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        
        .logo-text {
            font-size: 36px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff 0%, #ff6b35 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle { font-size: 18px; color: #888; margin-bottom: 28px; font-weight: 400; }
        
        .github-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255,107,53,0.3);
        }
        
        .github-link:hover { box-shadow: 0 8px 25px rgba(255,107,53,0.5); transform: translateY(-2px); }
        .github-icon { width: 18px; height: 18px; }
        
        .search-box { max-width: 600px; margin: 0 auto 56px; }
        
        .search-input {
            width: 100%;
            padding: 18px 24px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .search-input:focus { background: rgba(255,255,255,0.08); border-color: #ff6b35; box-shadow: 0 0 0 3px rgba(255,107,53,0.1); }
        .search-input::placeholder { color: #555; }
        
        .category { margin-bottom: 56px; }
        
        .category-title {
            font-size: 13px;
            font-weight: 700;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            padding-left: 6px;
        }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
        
        .card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px;
            padding: 24px;
            transition: all 0.3s ease;
        }
        
        .card:hover {
            background: rgba(255,255,255,0.06);
            border-color: #ff6b35;
            transform: translateY(-6px);
            box-shadow: 0 15px 40px rgba(255,107,53,0.25);
        }
        
        .card-header { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 14px; }
        
        .card-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }
        
        .card:hover .card-icon { transform: scale(1.15) rotate(5deg); }
        
        .icon-official { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); box-shadow: 0 4px 15px rgba(59,130,246,0.3); }
        .icon-original { background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%); box-shadow: 0 4px 15px rgba(255,107,53,0.3); }
        .icon-community { background: linear-gradient(135deg, #64748b 0%, #475569 100%); box-shadow: 0 4px 15px rgba(100,116,139,0.3); }
        
        .card-info { flex: 1; min-width: 0; }
        
        .card-title { font-size: 17px; font-weight: 700; color: #fff; margin-bottom: 8px; line-height: 1.3; }
        
        .card-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            border: 1px solid;
        }
        
        .badge-official { background: rgba(59,130,246,0.12); color: #60a5fa; border-color: rgba(59,130,246,0.25); }
        .badge-original { background: rgba(255,107,53,0.12); color: #ff8a65; border-color: rgba(255,107,53,0.25); }
        .badge-community { background: rgba(100,116,139,0.12); color: #94a3b8; border-color: rgba(100,116,139,0.25); }
        
        .card-desc {
            font-size: 14px;
            color: #999;
            line-height: 1.6;
            margin-bottom: 18px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 44px;
        }
        
        .card-actions { display: flex; gap: 10px; }
        
        .btn {
            flex: 1;
            padding: 11px 16px;
            border-radius: 11px;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            text-decoration: none;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
            display: inline-block;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
            color: #fff;
            box-shadow: 0 2px 10px rgba(255,107,53,0.3);
        }
        
        .btn-primary:hover { background: linear-gradient(135deg, #ff5722 0%, #e67e22 100%); transform: translateY(-1px); }
        
        .btn-secondary {
            background: rgba(255,255,255,0.05);
            color: #ccc;
            border: 1px solid rgba(255,255,255,0.12);
        }
        
        .btn-secondary:hover { background: rgba(255,255,255,0.1); color: #fff; }
        
        .loading { text-align: center; padding: 60px; color: #666; font-size: 16px; }
        
        .error {
            text-align: center;
            padding: 40px;
            color: #ff6b35;
            background: rgba(255,107,53,0.1);
            border-radius: 12px;
            margin: 20px;
        }
        
        .refresh-btn {
            display: inline-block;
            margin-left: 20px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: #888;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .refresh-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
        
        .cache-note { font-size: 12px; color: #666; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="bg-glow"></div>
    
    <div class="container">
        <div class="header">
            <div class="logo">
                <div class="logo-icon">🦞</div>
                <div class="logo-text">OpenClaw Skills</div>
            </div>
            <div class="subtitle">
                <span id="skill-count">0</span> 个强大技能，让 AI 助手无所不能
                <button class="refresh-btn" onclick="loadSkills(true)" title="刷新技能列表">🔄</button>
            </div>
            <div class="cache-note" id="cache-note"></div>
            <a href="https://github.com/zhangxun057/openclaw-skills" target="_blank" class="github-link">
                <svg class="github-icon" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                </svg>
                查看源码
            </a>
        </div>

        <div class="search-box">
            <input type="text" class="search-input" placeholder="搜索技能..." id="search">
        </div>

        <div id="content">
            <div class="loading">正在从 GitHub 加载技能列表...</div>
        </div>
    </div>

    <script>
        const GITHUB_REPO = 'zhangxun057/openclaw-skills';
        const GITHUB_API = `https://api.github.com/repos/${GITHUB_REPO}/contents/skills`;
        
        const CACHE_KEY = 'openclaw_skills_cache';
        const CACHE_DURATION = 60 * 60 * 1000; // 1小时缓存
        
        // 备用静态数据（API 失败时使用）
        const FALLBACK_SKILLS = [
            { name: 'feishu-bitable', category: '飞书生态', icon: '📋', source: 'community', desc: '飞书多维表格管理' },
            { name: 'feishu-calendar', category: '飞书生态', icon: '📅', source: 'community', desc: '飞书日历与日程管理' },
            { name: 'feishu-im-read', category: '飞书生态', icon: '💬', source: 'community', desc: '飞书消息读取工具' },
            { name: 'feishu-task', category: '飞书生态', icon: '✅', source: 'community', desc: '飞书任务管理' },
            { name: 'wechat-analyzer', category: '微信 & 社交', icon: '📊', source: 'community', desc: '微信好友分析与档案生成' },
            { name: 'weflow', category: '微信 & 社交', icon: '💬', source: 'community', desc: '微信聊天记录工具集成' },
            { name: 'wechat-send-message', category: '微信 & 社交', icon: '📤', source: 'community', desc: 'macOS微信发送消息' },
            { name: 'browser-automation', category: '开发 & 部署', icon: '🌐', source: 'official', desc: 'OpenClaw 浏览器自动化操作' },
            { name: 'cloudflare-deploy', category: '开发 & 部署', icon: '☁️', source: 'community', desc: 'Cloudflare Pages 自动部署' },
            { name: 'skill-creator', category: '技能管理', icon: '🛠️', source: 'official', desc: '创建和管理 AgentSkills' },
            { name: 'gateway-restart', category: '系统 & 工具', icon: '🔄', source: 'official', desc: 'OpenClaw Gateway 服务重启' },
            { name: 'capability-evolver', category: '系统 & 工具', icon: '🧬', source: 'community', desc: 'AI 代理自进化引擎' },
            { name: 'task-monitor', category: '系统 & 工具', icon: '📈', source: 'community', desc: '实时 Web 仪表板' },
            { name: 'todolist-manager', category: '效率工具', icon: '✅', source: 'community', desc: '个人待办清单管理' },
            { name: 'skill-radar', category: '技能管理', icon: '📡', source: 'community', desc: '技能市场雷达' },
            { name: 'skill-auditor', category: '技能管理', icon: '🔎', source: 'community', desc: '技能质量审计' },
            { name: 'swap', category: '技能管理', icon: '🔀', source: 'community', desc: '技能交换功能' },
            { name: 'content-extract', category: '内容生成', icon: '📥', source: 'community', desc: 'URL 内容提取' },
            { name: 'pdf-generator', category: '内容生成', icon: '📄', source: 'community', desc: 'PDF 生成工具' },
            { name: 'project-manager', category: '目标管理', icon: '📁', source: 'community', desc: '项目管理工具' },
        ];
        
        const CATEGORY_RULES = {
            'AI & 图像': ['ai-', 'image', 'vision', 'tts', 'audio', 'photo', 'flux', 'seedream', 'edge'],
            '视频 & 数字人': ['video', 'digital-human', 'jimeng', 'remotion', 'marking'],
            '微信 & 社交': ['wechat', 'weflow', 'weixin', 'wx', 'social', 'baoyu'],
            '飞书生态': ['feishu', 'lark', '飞书'],
            '开发 & 部署': ['deploy', 'cloudflare', 'vercel', 'browser', 'automation', 'dev'],
            '系统 & 工具': ['gateway', 'task', 'monitor', 'system', 'cron'],
            '效率工具': ['diary', 'todolist', 'todo', 'brainstorm', 'note', 'interview'],
            '技能管理': ['skill', 'swap', 'find', 'radar', 'auditor', 'creator', 'self-improving'],
            '内容生成': ['content', '生成', '写作', 'write', 'extract', 'pdf'],
            '目标管理': ['goal', '目标', '计划', 'project']
        };
        
        const SOURCE_KEYWORDS = {
            official: ['openclaw', '官方'],
            original: ['原创', 'zhangxun', '张洵']
        };
        
        const ICON_MAP = {
            'feishu': '📋', 'wechat': '💬', 'wechat-analyzer': '📊', 'weflow': '💬',
            'wechat-send-message': '📤', 'browser-automation': '🌐', 'cloudflare-deploy': '☁️',
            'skill-creator': '🛠️', 'gateway-restart': '🔄', 'capability-evolver': '🧬',
            'task-monitor': '📈', 'swap': '🔀', 'todolist-manager': '✅',
            'skill-radar': '📡', 'skill-auditor': '🔎', 'content-extract': '📥',
            'pdf-generator': '📄', 'project-manager': '📁', 'diary-assistant': '📔',
            'jimeng-digital-human': '👤', 'edge-tts': '🔊', 'image-generation': '🎨',
            'seedream': '🏞️', 'news-aggregator': '📰', 'find-skills': '🔍'
        };
        
        // 缓存管理
        function getCache() {
            try {
                const cached = localStorage.getItem(CACHE_KEY);
                if (cached) {
                    const data = JSON.parse(cached);
                    if (Date.now() - data.timestamp < CACHE_DURATION) {
                        return data;
                    }
                }
            } catch (e) {}
            return null;
        }
        
        function setCache(skills) {
            try {
                localStorage.setItem(CACHE_KEY, JSON.stringify({
                    skills: skills,
                    timestamp: Date.now()
                }));
            } catch (e) {}
        }
        
        function getCategory(slug) {
            slug = slug.toLowerCase();
            for (const [category, keywords] of Object.entries(CATEGORY_RULES)) {
                for (const kw of keywords) {
                    if (slug.includes(kw.toLowerCase())) return category;
                }
            }
            return '其他工具';
        }
        
        function getIcon(slug) {
            return ICON_MAP[slug] || '🔧';
        }
        
        function getSource(slug, description) {
            const text = (slug + ' ' + (description || '')).toLowerCase();
            if (SOURCE_KEYWORDS.official.some(kw => text.includes(kw.toLowerCase()))) return 'official';
            if (SOURCE_KEYWORDS.original.some(kw => text.includes(kw.toLowerCase()))) return 'original';
            return 'community';
        }
        
        async function fetchSkillDescription(slug) {
            try {
                const response = await fetch(
                    `https://api.github.com/repos/${GITHUB_REPO}/contents/skills/${slug}/SKILL.md`,
                    { cache: 'no-store' }
                );
                if (!response.ok) return '';
                const data = await response.json();
                if (data.content) {
                    const content = atob(data.content);
                    const match = content.match(/description:\s*["']([^"']+)["']/);
                    if (match) return match[1];
                    const lines = content.split('\n');
                    for (const line of lines) {
                        const trimmed = line.trim();
                        if (trimmed && !trimmed.startsWith('#') && !trimmed.startsWith('---')) {
                            return trimmed.replace(/^[-*>]+\s*/, '').substring(0, 100);
                        }
                    }
                }
            } catch (e) {}
            return '';
        }
        
        async function loadSkills(forceRefresh = false) {
            const content = document.getElementById('content');
            const cacheNote = document.getElementById('cache-note');
            
            // 尝试从缓存加载
            if (!forceRefresh) {
                const cache = getCache();
                if (cache) {
                    cacheNote.textContent = '📦 使用缓存 (1小时内有效)';
                    renderSkillsOrganize(cache.skills);
                    return;
                }
            }
            
            content.innerHTML = '<div class="loading">正在从 GitHub 加载技能列表...</div>';
            
            try {
                const response = await fetch(GITHUB_API, { cache: 'no-store' });
                if (!response.ok) throw new Error('API 限流或网络错误');
                
                const items = await response.json();
                const skillDirs = items.filter(item => item.type === 'dir');
                
                // 获取描述（限制并发数）
                const skillsWithDesc = [];
                const batchSize = 5;
                for (let i = 0; i < skillDirs.length; i += batchSize) {
                    const batch = skillDirs.slice(i, i + batchSize);
                    const results = await Promise.all(
                        batch.map(async (dir) => {
                            const desc = await fetchSkillDescription(dir.name);
                            return {
                                name: dir.name,
                                slug: dir.name,
                                desc: desc || `查看 ${dir.name} 技能详情`,
                                icon: getIcon(dir.name),
                                source: getSource(dir.name, desc),
                                category: getCategory(dir.name)
                            };
                        })
                    );
                    skillsWithDesc.push(...results);
                }
                
                // 缓存结果
                setCache(skillsWithDesc);
                cacheNote.textContent = '✅ 已更新到最新';
                
                renderSkillsOrganize(skillsWithDesc);
                
            } catch (error) {
                console.error('加载失败:', error);
                
                // 尝试使用缓存
                const cache = getCache();
                if (cache) {
                    cacheNote.textContent = '⚠️ API 失败，使用缓存数据';
                    renderSkillsOrganize(cache.skills);
                    return;
                }
                
                // 使用备用数据
                cacheNote.textContent = '⚠️ 使用离线数据';
                const fallback = FALLBACK_SKILLS.map(s => ({
                    ...s,
                    category: s.category || getCategory(s.name)
                }));
                renderSkillsOrganize(fallback);
            }
        }
        
        function renderSkillsOrganize(skills) {
            const categorized = {};
            for (const skill of skills) {
                const cat = skill.category || getCategory(skill.slug || skill.name);
                if (!categorized[cat]) categorized[cat] = [];
                categorized[cat].push(skill);
            }
            
            document.getElementById('skill-count').textContent = skills.length;
            renderSkills(categorized);
        }
        
        function renderSkills(categorized) {
            const content = document.getElementById('content');
            const sourceLabels = { official: '官方', original: '原创', community: '社区' };
            
            const categoryOrder = [
                'AI & 图像', '视频 & 数字人', '微信 & 社交', '飞书生态',
                '开发 & 部署', '系统 & 工具', '效率工具', '技能管理', '内容生成', '目标管理', '其他工具'
            ];
            
            let html = '';
            
            for (const category of categoryOrder) {
                const items = categorized[category];
                if (!items || items.length === 0) continue;
                
                html += `<div class="category">
                    <div class="category-title">${category}</div>
                    <div class="grid">`;
                
                for (const skill of items) {
                    const name = skill.slug || skill.name;
                    html += `<div class="card" data-skill="">
                        <div class="card-header">
                            <div class="card-icon icon-${skill.source}">${skill.icon}</div>
                            <div class="card-info">
                                <div class="card-title">${formatName(name)}</div>
                                <span class="card-badge badge-${skill.source}">${sourceLabels[skill.source]}</span>
                            </div>
                        </div>
                        <div class="card-desc">${skill.desc}</div>
                        <div class="card-actions">
                            <a href="https://github.com/${GITHUB_REPO}/tree/master/skills/${name}" target="_blank" class="btn btn-primary">查看</a>
                            <a href="https://github.com/${GITHUB_REPO}/archive/refs/heads/master.zip" download class="btn btn-secondary">下载</a>
                        </div>
                    </div>`;
                }
                
                html += '</div></div>';
            }
            
            content.innerHTML = html || '<div class="error">没有找到技能</div>';
        }
        
        function formatName(slug) {
            return slug.split(/[-_]/).map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
        }
        
        document.getElementById('search').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            document.querySelectorAll('[data-skill]').forEach(card => {
                const text = card.textContent.toLowerCase();
                card.style.display = text.includes(query) ? 'block' : 'none';
            });
        });
        
        loadSkills();
    </script>
</body>
</html>
