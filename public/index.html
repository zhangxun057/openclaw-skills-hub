<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Skills - 张洵的技能库</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #0a0a0f;
            color: #fff;
            line-height: 1.6;
            min-height: 100vh;
        }
        .bg-pattern {
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }
        .bg-glow {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 400px;
            background: radial-gradient(circle, rgba(255,107,53,0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 60px 24px 80px;
        }
        .header {
            text-align: center;
            margin-bottom: 56px;
        }
        .logo {
            display: inline-flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 20px;
        }
        .logo-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            box-shadow: 0 10px 30px rgba(255,107,53,0.4);
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .logo-text {
            font-size: 36px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff 0%, #ff6b35 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            font-size: 18px;
            color: #888;
            margin-bottom: 28px;
            font-weight: 400;
        }
        .header-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .github-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255,107,53,0.3);
        }
        .github-link:hover {
            box-shadow: 0 8px 25px rgba(255,107,53,0.5);
            transform: translateY(-2px);
        }
        .submit-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            background: rgba(255,255,255,0.08);
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .submit-link:hover {
            background: rgba(255,255,255,0.12);
            border-color: #ff6b35;
        }
        .github-icon {
            width: 18px;
            height: 18px;
        }
        .search-box {
            max-width: 600px;
            margin: 0 auto 56px;
        }
        .search-input {
            width: 100%;
            padding: 18px 24px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }
        .search-input:focus {
            background: rgba(255,255,255,0.08);
            border-color: #ff6b35;
            box-shadow: 0 0 0 3px rgba(255,107,53,0.1);
        }
        .search-input::placeholder {
            color: #555;
        }
        .category {
            margin-bottom: 56px;
        }
        .category-title {
            font-size: 13px;
            font-weight: 700;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            padding-left: 6px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
        .card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px;
            padding: 24px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .card:hover {
            background: rgba(255,255,255,0.06);
            border-color: #ff6b35;
            transform: translateY(-6px);
            box-shadow: 0 15px 40px rgba(255,107,53,0.25);
        }
        .card-header {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            margin-bottom: 14px;
        }
        .card-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }
        .card:hover .card-icon {
            transform: scale(1.15) rotate(5deg);
        }
        .icon-official { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); box-shadow: 0 4px 15px rgba(59,130,246,0.3); }
        .icon-original { background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%); box-shadow: 0 4px 15px rgba(255,107,53,0.3); }
        .icon-community { background: linear-gradient(135deg, #64748b 0%, #475569 100%); box-shadow: 0 4px 15px rgba(100,116,139,0.3); }
        .card-info {
            flex: 1;
            min-width: 0;
        }
        .card-title {
            font-size: 17px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
            line-height: 1.3;
        }
        .card-meta {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .card-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            border: 1px solid;
        }
        .badge-official { background: rgba(59,130,246,0.12); color: #60a5fa; border-color: rgba(59,130,246,0.25); }
        .badge-original { background: rgba(255,107,53,0.12); color: #ff8a65; border-color: rgba(255,107,53,0.25); }
        .badge-community { background: rgba(100,116,139,0.12); color: #94a3b8; border-color: rgba(100,116,139,0.25); }
        .version-badge {
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 600;
            background: rgba(255,255,255,0.08);
            color: #888;
        }
        .card-desc {
            font-size: 14px;
            color: #999;
            line-height: 1.6;
            margin-bottom: 18px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 44px;
        }
        .card-actions {
            display: flex;
            gap: 10px;
        }
        .btn {
            flex: 1;
            padding: 11px 16px;
            border-radius: 11px;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            text-decoration: none;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
            display: inline-block;
        }
        .btn-primary {
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
            color: #fff;
            box-shadow: 0 2px 10px rgba(255,107,53,0.3);
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #ff5722 0%, #e67e22 100%);
            box-shadow: 0 4px 15px rgba(255,107,53,0.5);
            transform: translateY(-1px);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.05);
            color: #ccc;
            border: 1px solid rgba(255,255,255,0.12);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border-color: rgba(255,255,255,0.2);
        }
        .submit-section {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px;
            padding: 32px;
            margin-top: 56px;
        }
        .submit-section h2 {
            font-size: 24px;
            margin-bottom: 16px;
            color: #ff6b35;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #ccc;
            font-size: 14px;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }
        .form-group input:focus, .form-group textarea:focus {
            background: rgba(255,255,255,0.08);
            border-color: #ff6b35;
        }
        .form-group textarea {
            min-height: 200px;
            font-family: 'Courier New', monospace;
            resize: vertical;
        }
        .btn-submit {
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255,107,53,0.3);
        }
        .btn-submit:hover {
            box-shadow: 0 8px 25px rgba(255,107,53,0.5);
            transform: translateY(-2px);
        }
        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .alert {
            padding: 14px 18px;
            border-radius: 10px;
            margin-top: 16px;
            font-size: 14px;
        }
        .alert-success {
            background: rgba(34,197,94,0.15);
            color: #4ade80;
            border: 1px solid rgba(34,197,94,0.3);
        }
        .alert-error {
            background: rgba(239,68,68,0.15);
            color: #f87171;
            border: 1px solid rgba(239,68,68,0.3);
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="bg-glow"></div>
    
    <div class="container">
        <div class="header">
            <div class="logo">
                <div class="logo-icon">🦞</div>
                <div class="logo-text">OpenClaw Skills</div>
            </div>
            <div class="subtitle" id="subtitle">加载中...</div>
            <div class="header-buttons">
                <a href="https://github.com/zhangxun057/openclaw-skills" target="_blank" class="github-link">
                    <svg class="github-icon" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                    </svg>
                    查看源码
                </a>
                <a href="#submit" class="submit-link">📝 提交技能</a>
            </div>
        </div>

        <div class="search-box">
            <input type="text" class="search-input" placeholder="搜索技能..." id="search">
        </div>

        <div id="content"></div>

        <div id="submit" class="submit-section">
            <h2>📝 提交新技能</h2>
            <p style="color: #888; margin-bottom: 24px;">无需 GitHub 账号，填写表单即可提交。张洵会收到通知并审核。</p>
            <form id="submitForm">
                <div class="form-group">
                    <label>技能名称 *</label>
                    <input type="text" id="skillName" required placeholder="例如：weather">
                </div>
                <div class="form-group">
                    <label>你的名字 *</label>
                    <input type="text" id="contributor" required placeholder="例如：张三">
                </div>
                <div class="form-group">
                    <label>技能内容 (Markdown) *</label>
                    <textarea id="content" required placeholder="---
name: weather
description: 天气查询技能
version: 1.0.0
updated: 2026-03-06
---

# 技能说明

..."></textarea>
                </div>
                <div class="form-group">
                    <label>提交密码 *</label>
                    <input type="password" id="password" required placeholder="联系张洵获取">
                </div>
                <button type="submit" class="btn-submit" id="submitBtn">提交技能</button>
                <div id="submitResult"></div>
            </form>
        </div>
    </div>

    <script>
        const iconMap = {
            'agent-tools': '🤖', 'ai-image-generation': '🎨', 'flux-image': '✨', 'ai-product-photography': '📷',
            'ai-marketing-videos': '🎬', 'ai-video-generation': '🎥', 'remotion-render': '🖥️', 'jimeng-digital-human': '🧑',
            'wechat-analyzer': '📊', 'weflow': '💬', 'wechat-send-message': '📱', 'baoyu-post-to-wechat': '📝',
            'browser-automation': '🌐', 'cloudflare-deploy': '☁️', 'skill-creator': '🛠️', 'gateway-restart': '🔧',
            'capability-evolver': '🧬', 'task-monitor': '📈', 'conversation-save': '💾', 'feishu': '📋', 'swap': '🔄',
            'weather': '🌤️', 'clawhub': '🦞', 'coding-agent': '💻', 'gh-issues': '🐛', 'github': '🐙',
            'healthcheck': '🏥', 'openai-whisper': '🎤', 'video-frames': '🎞️', 'api-manager': '🔑'
        };

        async function loadSkills() {
            try {
                const response = await fetch('https://api.github.com/repos/zhangxun057/openclaw-skills/contents/');
                const files = await response.json();
                const skillFiles = files.filter(f => f.name.startsWith('skill-') && f.name.endsWith('.md'));
                
                document.getElementById('subtitle').textContent = `${skillFiles.length} 个强大技能，让 AI 助手无所不能`;
                
                const skills = await Promise.all(skillFiles.map(async file => {
                    const contentResponse = await fetch(file.download_url);
                    const content = await contentResponse.text();
                    const match = content.match(/^---\n([\s\S]*?)\n---/);
                    if (!match) return null;
                    
                    const frontmatter = {};
                    match[1].split('\n').forEach(line => {
                        const [key, ...valueParts] = line.split(':');
                        if (key && valueParts.length) {
                            frontmatter[key.trim()] = valueParts.join(':').trim().replace(/^["']|["']$/g, '');
                        }
                    });
                    
                    const slug = file.name.replace('skill-', '').replace('.md', '');
                    return {
                        name: frontmatter.name || slug,
                        slug: slug,
                        description: frontmatter.description || '',
                        version: frontmatter.version || '1.0.0',
                        updated: frontmatter.updated || '',
                        author: frontmatter.author || '',
                        icon: iconMap[slug] || '📦',
                        source: frontmatter.author === '张洵' ? 'original' : 'community',
                        downloadUrl: file.download_url
                    };
                }));
                
                const validSkills = skills.filter(s => s !== null);
                renderSkills(validSkills);
                
                document.getElementById('search').addEventListener('input', (e) => {
                    const query = e.target.value.toLowerCase();
                    document.querySelectorAll('[data-skill]').forEach(card => {
                        const text = card.textContent.toLowerCase();
                        card.style.display = text.includes(query) ? 'block' : 'none';
                    });
                });
            } catch (error) {
                document.getElementById('content').innerHTML = '<p style="color: #f87171;">加载失败，请刷新重试</p>';
            }
        }

        function renderSkills(skills) {
            const categories = {
                'AI & 图像': skills.filter(s => ['agent-tools', 'ai-image-generation', 'flux-image', 'ai-product-photography'].includes(s.slug)),
                '视频 & 数字人': skills.filter(s => ['ai-marketing-videos', 'ai-video-generation', 'remotion-render', 'jimeng-digital-human'].includes(s.slug)),
                '微信 & 社交': skills.filter(s => ['wechat-analyzer', 'weflow', 'wechat-send-message', 'baoyu-post-to-wechat'].includes(s.slug)),
                '开发 & 部署': skills.filter(s => ['browser-automation', 'cloudflare-deploy', 'skill-creator', 'gateway-restart', 'coding-agent', 'github', 'gh-issues'].includes(s.slug)),
                '系统 & 工具': skills.filter(s => !['agent-tools', 'ai-image-generation', 'flux-image', 'ai-product-photography', 'ai-marketing-videos', 'ai-video-generation', 'remotion-render', 'jimeng-digital-human', 'wechat-analyzer', 'weflow', 'wechat-send-message', 'baoyu-post-to-wechat', 'browser-automation', 'cloudflare-deploy', 'skill-creator', 'gateway-restart', 'coding-agent', 'github', 'gh-issues'].includes(s.slug))
            };
            
            const sourceLabels = { official: '官方', original: '原创', community: '社区' };
            const content = document.getElementById('content');
            content.innerHTML = '';
            
            Object.entries(categories).forEach(([category, items]) => {
                if (items.length === 0) return;
                
                const section = document.createElement('div');
                section.className = 'category';
                
                const title = document.createElement('div');
                title.className = 'category-title';
                title.textContent = category;
                section.appendChild(title);
                
                const grid = document.createElement('div');
                grid.className = 'grid';
                
                items.forEach(skill => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.setAttribute('data-skill', '');
                    
                    card.innerHTML = `
                        <div class="card-header">
                            <div class="card-icon icon-${skill.source}">${skill.icon}</div>
                            <div class="card-info">
                                <div class="card-title">${skill.name}</div>
                                <div class="card-meta">
                                    <span class="card-badge badge-${skill.source}">${sourceLabels[skill.source]}</span>
                                    ${skill.version ? `<span class="version-badge">v${skill.version}</span>` : ''}
                                </div>
                            </div>
                        </div>
                        <div class="card-desc">${skill.description}</div>
                        <div class="card-actions">
                            <a href="https://github.com/zhangxun057/openclaw-skills/tree/master/skills/${skill.slug}" target="_blank" class="btn btn-primary">查看</a>
                            <a href="${skill.downloadUrl}" download="skill-${skill.slug}.md" class="btn btn-secondary">下载</a>
                        </div>
                    `;
                    
                    grid.appendChild(card);
                });
                
                section.appendChild(grid);
                content.appendChild(section);
            });
        }

        // Submit form
        document.getElementById('submitForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const result = document.getElementById('submitResult');
            btn.disabled = true;
            btn.textContent = '提交中...';
            result.innerHTML = '';
            
            try {
                const response = await fetch('/api/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        skillName: document.getElementById('skillName').value,
                        contributor: document.getElementById('contributor').value,
                        content: document.getElementById('content').value,
                        password: document.getElementById('password').value
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    result.innerHTML = `<div class="alert alert-success">✅ 提交成功！Issue #${data.issueNumber} 已创建。<a href="${data.issueUrl}" target="_blank" style="color: #4ade80; text-decoration: underline;">查看</a></div>`;
                    document.getElementById('submitForm').reset();
                } else {
                    result.innerHTML = `<div class="alert alert-error">❌ ${data.error || data.message || '提交失败'}</div>`;
                }
            } catch (error) {
                result.innerHTML = `<div class="alert alert-error">❌ 网络错误，请重试</div>`;
            } finally {
                btn.disabled = false;
                btn.textContent = '提交技能';
            }
        });

        loadSkills();
    </script>
</body>
</html>
