<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>张洵 · 微信社交网络图谱（真实数据）</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #151520 100%);
            color: #fff;
            overflow: hidden;
        }
        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 70px;
            background: rgba(10,10,15,0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 100;
        }
        .logo { display: flex; align-items: center; gap: 15px; }
        .logo-icon {
            width: 42px; height: 42px;
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }
        .logo-text { font-size: 18px; font-weight: 600; }
        .logo-text span { color: #666; font-size: 13px; margin-left: 12px; }
        .stats { display: flex; gap: 40px; }
        .stat-item { text-align: center; }
        .stat-value { font-size: 26px; font-weight: 700; color: #fff; }
        .stat-label { font-size: 11px; color: #555; margin-top: 4px; text-transform: uppercase; }
        #graph { position: fixed; top: 70px; left: 0; width: 100%; height: calc(100% - 70px); }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <div class="logo-icon">🦞</div>
            <div class="logo-text">
                张洵的社交网络
                <span>78位核心好友 · 279条关系 · 真实微信数据</span>
            </div>
        </div>
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value">78</div>
                <div class="stat-label">核心好友</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">279</div>
                <div class="stat-label">关系连接</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">21K+</div>
                <div class="stat-label">消息总数</div>
            </div>
        </div>
    </div>
    <div id="graph"></div>

    <script>
        // 真实数据 - Top 15 好友
        const data = {
            nodes: [
                { id: 'zhangxun', name: '张洵', level: 'self', radius: 45, color: '#f7931e', avatar: '张' },
                { id: '1', name: 'Aging', msgCount: 2000, sent: 787, received: 1213, level: 'vip', color: '#ff2d55', avatar: 'A' },
                { id: '2', name: "Cici'", msgCount: 2000, sent: 612, received: 1388, level: 'vip', color: '#ff2d55', avatar: 'C' },
                { id: '3', name: 'Jacob', msgCount: 1870, sent: 813, received: 1057, level: 'vip', color: '#ff2d55', avatar: 'J' },
                { id: '4', name: 'Jason Wang', msgCount: 1442, sent: 612, received: 830, level: 'high', color: '#ff9500', avatar: 'J' },
                { id: '5', name: 'Aorsking', msgCount: 739, sent: 280, received: 459, level: 'high', color: '#ff9500', avatar: 'A' },
                { id: '6', name: 'Roy 罗巍', msgCount: 687, sent: 300, received: 387, level: 'high', color: '#ff9500', avatar: 'R' },
                { id: '7', name: '呦！', msgCount: 637, sent: 220, received: 417, level: 'high', color: '#ff9500', avatar: '呦' },
                { id: '8', name: 'yuhan', msgCount: 677, sent: 250, received: 427, level: 'high', color: '#ff9500', avatar: 'Y' },
                { id: '9', name: 'QQQ', msgCount: 353, sent: 150, received: 203, level: 'medium', color: '#34c759', avatar: 'Q' },
                { id: '10', name: 'Candy', msgCount: 442, sent: 180, received: 262, level: 'medium', color: '#34c759', avatar: 'C' },
                { id: '11', name: '包东浩', msgCount: 205, sent: 80, received: 125, level: 'medium', color: '#34c759', avatar: '包' },
                { id: '12', name: 'CLEO', msgCount: 182, sent: 70, received: 112, level: 'medium', color: '#34c759', avatar: 'C' },
                { id: '13', name: 'EB-Man', msgCount: 233, sent: 90, received: 143, level: 'medium', color: '#34c759', avatar: 'E' },
                { id: '14', name: '刘宗睿', msgCount: 72, sent: 30, received: 42, level: 'low', color: '#5856d6', avatar: '刘' },
                { id: '15', name: '周伟', msgCount: 55, sent: 20, received: 35, level: 'low', color: '#5856d6', avatar: '周' }
            ],
            links: []
        };
        
        // 生成连接
        data.nodes.forEach(node => {
            if (node.id !== 'zhangxun') {
                data.links.push({
                    source: 'zhangxun',
                    target: node.id,
                    value: node.msgCount / 5000
                });
            }
        });
        
        // 计算半径
        data.nodes.forEach(n => {
            if (n.id !== 'zhangxun') {
                n.radius = Math.sqrt(n.msgCount) / 2.5 + 12;
            }
        });
        
        const width = window.innerWidth;
        const height = window.innerHeight - 70;
        
        const svg = d3.select('#graph')
            .append('svg')
            .attr('width', width)
            .attr('height', height)
            .call(d3.zoom().scaleExtent([0.5, 3]).on('zoom', (e) => g.attr('transform', e.transform)));
        
        const g = svg.append('g');
        
        const simulation = d3.forceSimulation(data.nodes)
            .force('link', d3.forceLink(data.links).id(d => d.id).distance(d => d.source.id === 'zhangxun' ? 150 : 200))
            .force('charge', d3.forceManyBody().strength(d => d.id === 'zhangxun' ? -1000 : -400))
            .force('center', d3.forceCenter(width / 2, height / 2))
            .force('collision', d3.forceCollide().radius(d => (d.radius || 20) + 10));
        
        const link = g.append('g').selectAll('line').data(data.links)
            .join('line').attr('stroke', '#444').attr('stroke-opacity', 0.3).attr('stroke-width', d => Math.max(1, d.value * 3));
        
        const node = g.append('g').selectAll('.node').data(data.nodes)
            .join('g').attr('class', 'node')
            .call(d3.drag().on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
                .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
                .on('end', (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }));
        
        // 脉冲光环
        node.filter(d => d.id !== 'zhangxun')
            .append('circle')
            .attr('r', d => d.radius + 8)
            .attr('fill', 'none')
            .attr('stroke', d => d.color)
            .attr('stroke-width', 1.5)
            .attr('stroke-opacity', 0.3)
            .append('animate').attr('attributeName', 'r').attr('values', `${d => d.radius + 8};${d => d.radius + 12};${d => d.radius + 8}`).attr('dur', '2s').attr('repeatCount', 'indefinite');
        
        // 主圆
        node.append('circle')
            .attr('r', d => d.radius)
            .attr('fill', d => d.color)
            .attr('stroke', d => d.id === 'zhangxun' ? '#fff' : 'none')
            .attr('stroke-width', d => d.id === 'zhangxun' ? 3 : 0);
        
        // 头像
        node.append('text')
            .attr('dy', 4).attr('text-anchor', 'middle')
            .style('font-size', d => d.id === 'zhangxun' ? '18px' : '13px')
            .style('font-weight', '700').style('fill', '#fff')
            .text(d => d.avatar);
        
        // 名称
        node.append('text')
            .attr('dy', d => d.radius + 18).attr('text-anchor', 'middle')
            .style('font-weight', d => d.level === 'vip' ? '700' : '500')
            .style('font-size', '11px').style('fill', 'rgba(255,255,255,0.85)')
            .text(d => d.name);
        
        simulation.on('tick', () => {
            link.attr('x1', d => d.source.x).attr('y1', d => d.source.y).attr('x2', d => d.target.x).attr('y2', d => d.target.y);
            node.attr('transform', d => `translate(${d.x},${d.y})`);
        });
    </script>
</body>
</html>
