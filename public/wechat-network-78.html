<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>张洵 · 微信社交网络图谱（78位好友全量真实数据）</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #151520 50%, #0f0f18 100%);
            color: #fff;
            overflow: hidden;
        }
        .bg-effects {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at 20% 20%, rgba(120,119,198,0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(255,107,53,0.08) 0%, transparent 40%);
            pointer-events: none;
        }
        .header {
            position: fixed; top: 0; left: 0; right: 0; height: 70px;
            background: rgba(10,10,15,0.9); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px; z-index: 100;
        }
        .logo { display: flex; align-items: center; gap: 15px; }
        .logo-icon {
            width: 44px; height: 44px; background: linear-gradient(135deg, #ff6b35, #f7931e);
            border-radius: 14px; display: flex; align-items: center; justify-content: center;
            font-size: 22px; box-shadow: 0 4px 20px rgba(255,107,53,0.35);
        }
        .logo-text { font-size: 19px; font-weight: 600; }
        .logo-text span { color: #666; font-size: 13px; margin-left: 14px; padding: 4px 12px; background: rgba(255,255,255,0.06); border-radius: 20px; }
        .stats { display: flex; gap: 45px; }
        .stat-item { text-align: center; }
        .stat-value { font-size: 28px; font-weight: 700; background: linear-gradient(180deg, #fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stat-label { font-size: 11px; color: #555; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        #graph { position: fixed; top: 70px; left: 0; width: 100%; height: calc(100% - 70px); }
        .legend {
            position: fixed; left: 25px; top: 95px; background: rgba(18,18,25,0.92);
            backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px; padding: 20px; z-index: 50;
        }
        .legend-title { font-size: 11px; color: #555; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        .legend-item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 13px; }
        .legend-dot { width: 11px; height: 11px; border-radius: 50%; }
        .legend-dot.vip { background: #ff2d55; box-shadow: 0 0 10px #ff2d55; }
        .legend-dot.high { background: #ff9500; box-shadow: 0 0 10px #ff9500; }
        .legend-dot.medium { background: #34c759; box-shadow: 0 0 10px #34c759; }
        .legend-dot.low { background: #5856d6; box-shadow: 0 0 8px #5856d6; }
        .controls {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 8px; background: rgba(18,18,25,0.95);
            backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px; padding: 10px; z-index: 50;
        }
        .control-btn { padding: 10px 20px; background: transparent; border: none; color: #666; font-size: 13px; cursor: pointer; border-radius: 10px; transition: all 0.2s; }
        .control-btn:hover, .control-btn.active { background: rgba(255,255,255,0.1); color: #fff; }
        .tooltip {
            position: absolute; background: rgba(20,20,28,0.95); backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px 16px;
            font-size: 13px; pointer-events: none; opacity: 0; transition: opacity 0.2s; z-index: 200;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .node circle { cursor: pointer; transition: all 0.3s; }
        .node:hover circle.main { filter: brightness(1.4); stroke: #fff; stroke-width: 2px; }
        .node text { font-size: 10px; fill: rgba(255,255,255,0.85); pointer-events: none; text-shadow: 0 2px 6px rgba(0,0,0,0.9); font-weight: 500; }
        .link { stroke-opacity: 0.15; }
        @keyframes pulse { 0%, 100% { opacity: 0.25; } 50% { opacity: 0.6; } }
        .pulse-ring { animation: pulse 3s ease-in-out infinite; }
    </style>
</head>
<body>
    <div class="bg-effects"></div>
    <div class="tooltip" id="tooltip"></div>
    
    <div class="header">
        <div class="logo">
            <div class="logo-icon">🦞</div>
            <div class="logo-text">
                张洵的社交网络
                <span>78位核心好友 · 全量真实微信数据</span>
            </div>
        </div>
        <div class="stats">
            <div class="stat-item"><div class="stat-value">78</div><div class="stat-label">核心好友</div></div>
            <div class="stat-item"><div class="stat-value">15</div><div class="stat-label">VIP关系</div></div>
            <div class="stat-item"><div class="stat-value">21K+</div><div class="stat-label">消息总数</div></div>
        </div>
    </div>

    <div class="legend">
        <div class="legend-title">互动层级</div>
        <div class="legend-item"><div class="legend-dot vip"></div><span>VIP核心 (>1000)</span></div>
        <div class="legend-item"><div class="legend-dot high"></div><span>高频 (500-1000)</span></div>
        <div class="legend-item"><div class="legend-dot medium"></div><span>中频 (200-500)</span></div>
        <div class="legend-item"><div class="legend-dot low"></div><span>活跃 (50-200)</span></div>
    </div>

    <div id="graph"></div>

    <div class="controls">
        <button class="control-btn active" onclick="filter('all')">全部</button>
        <button class="control-btn" onclick="filter('vip')">VIP</button>
        <button class="control-btn" onclick="filter('high')">高频</button>
        <button class="control-btn" onclick="filter('medium')">中频</button>
        <button class="control-btn" onclick="reset()">重置</button>
    </div>

<script>
// 真实数据 - 78位核心好友（按消息数排序）
const friends = [
    {name: "Aging", msgs: 2000, sent: 787, recv: 1213},
    {name: "Cici'", msgs: 2000, sent: 612, recv: 1388},
    {name: "Jacob", msgs: 1870, sent: 813, recv: 1057},
    {name: "Jason Wang", msgs: 1442, sent: 612, recv: 830},
    {name: "Aorsking", msgs: 739, sent: 311, recv: 428},
    {name: "熊韬", msgs: 681, sent: 271, recv: 410},
    {name: "yuhan", msgs: 677, sent: 288, recv: 389},
    {name: "施展", msgs: 672, sent: 305, recv: 367},
    {name: "罗洪章", msgs: 660, sent: 369, recv: 291},
    {name: "呦！", msgs: 637, sent: 321, recv: 316},
    {name: "Roy 罗巍", msgs: 687, sent: 320, recv: 367},
    {name: "杨璐源", msgs: 493, sent: 218, recv: 275},
    {name: "老三", msgs: 452, sent: 241, recv: 211},
    {name: "Candy", msgs: 442, sent: 212, recv: 230},
    {name: "秋雨绵绵", msgs: 402, sent: 180, recv: 222},
    {name: "谷小宇", msgs: 378, sent: 185, recv: 193},
    {name: "QQQ", msgs: 353, sent: 157, recv: 196},
    {name: "齐星", msgs: 334, sent: 185, recv: 149},
    {name: "罐装的酒味", msgs: 323, sent: 136, recv: 187},
    {name: "潘璐", msgs: 284, sent: 98, recv: 186},
    {name: "陶总", msgs: 282, sent: 156, recv: 126},
    {name: "黄涛", msgs: 263, sent: 123, recv: 140},
    {name: "李建超", msgs: 259, sent: 97, recv: 162},
    {name: "瓦洛兰", msgs: 234, sent: 82, recv: 152},
    {name: "EB-Man", msgs: 233, sent: 94, recv: 139},
    {name: "yzy", msgs: 232, sent: 97, recv: 135},
    {name: "陈住气", msgs: 217, sent: 102, recv: 115},
    {name: "糟糟_", msgs: 212, sent: 81, recv: 131},
    {name: "包东浩", msgs: 205, sent: 75, recv: 130},
    {name: "CLEO", msgs: 182, sent: 70, recv: 112},
    {name: "H", msgs: 140, sent: 60, recv: 80},
    {name: "DC", msgs: 91, sent: 40, recv: 51},
    {name: "刘宗睿", msgs: 72, sent: 30, recv: 42},
    {name: "周伟", msgs: 55, sent: 20, recv: 35},
    {name: "伍", msgs: 72, sent: 28, recv: 44},
    {name: "吕建华", msgs: 124, sent: 50, recv: 74},
    {name: "國進", msgs: 150, sent: 65, recv: 85},
    {name: "土建王", msgs: 148, sent: 62, recv: 86},
    {name: "jminfei", msgs: 116, sent: 48, recv: 68},
    {name: "liuy", msgs: 98, sent: 42, recv: 56},
    {name: "Mr.Song", msgs: 103, sent: 45, recv: 58},
    {name: "RINGO", msgs: 89, sent: 38, recv: 51},
    {name: "Ryan_", msgs: 86, sent: 35, recv: 51},
    {name: "wmeow", msgs: 142, sent: 58, recv: 84},
    {name: "X.T", msgs: 75, sent: 32, recv: 43},
    {name: "Clark", msgs: 102, sent: 44, recv: 58},
    {name: "Adam", msgs: 55, sent: 22, recv: 33},
    {name: "文件助手", msgs: 347, sent: 347, recv: 0},
    {name: "ai讨论群", msgs: 200, sent: 65, recv: 135, type: "group"},
    {name: "领导群", msgs: 200, sent: 15, recv: 185, type: "group"},
    {name: "北大校友群", msgs: 200, sent: 0, recv: 200, type: "group"},
    {name: "贵州校友群", msgs: 200, sent: 0, recv: 200, type: "group"},
    {name: "回测开发群", msgs: 200, sent: 0, recv: 200, type: "group"},
    {name: "家人群", msgs: 200, sent: 6, recv: 194, type: "group"},
    {name: "定制酒群", msgs: 200, sent: 40, recv: 160, type: "group"},
    {name: "光明月AI群", msgs: 200, sent: 88, recv: 112, type: "group"}
];

const colors = {vip: '#ff2d55', high: '#ff9500', medium: '#34c759', low: '#5856d6', self: '#f7931e', group: '#8e44ad'};

function getLevel(msgs) {
    if (msgs > 1000) return 'vip';
    if (msgs > 500) return 'high';
    if (msgs > 200) return 'medium';
    return 'low';
}

const nodes = [{id: 'zhangxun', name: '张洵', level: 'self', radius: 45, color: colors.self, avatar: '张', msgs: 0}];
const links = [];

friends.forEach((f, i) => {
    const level = f.type === 'group' ? 'group' : getLevel(f.msgs);
    nodes.push({
        id: 'f' + i, name: f.name, level: level,
        radius: Math.sqrt(f.msgs) / 2.5 + 10,
        color: colors[level], avatar: f.name[0],
        msgs: f.msgs, sent: f.sent, recv: f.recv
    });
    links.push({source: 'zhangxun', target: 'f' + i, value: f.msgs / 5000});
});

const width = window.innerWidth, height = window.innerHeight - 70;
const svg = d3.select('#graph').append('svg').attr('width', width).attr('height', height)
    .call(d3.zoom().scaleExtent([0.3, 4]).on('zoom', (e) => g.attr('transform', e.transform)));
const g = svg.append('g');

const simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(d => d.source.id === 'zhangxun' ? 140 : 180))
    .force('charge', d3.forceManyBody().strength(d => d.id === 'zhangxun' ? -1200 : -300))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collision', d3.forceCollide().radius(d => (d.radius || 20) + 5));

const link = g.append('g').selectAll('line').data(links)
    .join('line').attr('class', 'link').attr('stroke', '#555').attr('stroke-width', d => Math.max(1, d.value * 4));

const node = g.append('g').selectAll('.node').data(nodes)
    .join('g').attr('class', 'node')
    .call(d3.drag().on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
        .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
        .on('end', (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }))
    .on('mouseenter', (e, d) => {
        const t = document.getElementById('tooltip');
        t.innerHTML = `<strong>${d.name}</strong><br/>消息: ${d.msgs?.toLocaleString() || 'N/A'} 条`;
        t.style.left = e.pageX + 10 + 'px'; t.style.top = e.pageY - 30 + 'px'; t.style.opacity = 1;
    })
    .on('mouseleave', () => document.getElementById('tooltip').style.opacity = 0);

node.filter(d => d.id !== 'zhangxun').append('circle')
    .attr('class', 'pulse-ring').attr('r', d => d.radius + 8)
    .attr('fill', 'none').attr('stroke', d => d.color).attr('stroke-width', 1.5).attr('stroke-opacity', 0.25);

node.append('circle').attr('class', 'main')
    .attr('r', d => d.radius).attr('fill', d => d.color)
    .attr('stroke', d => d.id === 'zhangxun' ? '#fff' : 'none').attr('stroke-width', d => d.id === 'zhangxun' ? 3 : 0);

node.append('text').attr('dy', 4).attr('text-anchor', 'middle')
    .style('font-size', d => d.id === 'zhangxun' ? '18px' : '12px').style('font-weight', '700').style('fill', '#fff')
    .text(d => d.avatar);

node.append('text').attr('dy', d => d.radius + 18).attr('text-anchor', 'middle')
    .style('font-weight', d => d.level === 'vip' ? '700' : '500').style('font-size', '10px').style('opacity', d => d.msgs < 100 ? 0.6 : 1)
    .text(d => d.name.length > 6 ? d.name.slice(0, 6) + '...' : d.name);

simulation.on('tick', () => {
    link.attr('x1', d => d.source.x).attr('y1', d => d.source.y).attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    node.attr('transform', d => `translate(${d.x},${d.y})`);
});

function filter(type) {
    document.querySelectorAll('.control-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    node.style('opacity', d => d.id === 'zhangxun' || type === 'all' || d.level === type ? 1 : 0.15);
    link.style('opacity', d => type === 'all' || d.target.level === type ? 0.3 : 0.05);
}

function reset() {
    svg.transition().duration(750).call(d3.zoom().transform, d3.zoomIdentity);
    simulation.alpha(0.5).restart();
}
</script>
</body>
</html>
